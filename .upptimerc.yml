# Upptime config — FURCNX brand  →  status.furcnx.com
# Copy as `.upptimerc.yml` into `iPLAYCAFE-dev/status-furcnx` (from the upptimejs/upptime template, PUBLIC).
# NOTE: furcnx.com DNS lives in a SEPARATE Cloudflare account — set the status.furcnx.com CNAME there.
# Schema: https://upptime.js.org/docs/configuration

owner: iPLAYCAFE-dev
repo: status-furcnx

sites:
  # Socket.IO realtime (Bunny Magic Containers — kept). /v1/ping is DB-INDEPENDENT (liveness).
  - name: Socket.IO (ping)
    url: https://socketio.furcnx.com/v1/ping
    expectedStatusCodes:
      - 200
    maxResponseTime: 5000

  # /v1/health is DB-gated (Neon Postgres + Upstash Redis) — surfaces those deps indirectly.
  # If it returns non-200 when a dep is down, that correctly shows "down/degraded" on the page.
  - name: Socket.IO (health · Neon+Upstash)
    url: https://socketio.furcnx.com/v1/health
    expectedStatusCodes:
      - 200
    maxResponseTime: 8000

status-website:
  cname: status.furcnx.com
  name: FURCNX Status
  introTitle: "**FURCNX** service status"
  introMessage: Live status of FURCNX realtime services.
  navbar:
    - title: Status
      href: /

assignees:
  - iPLAYCAFE-dev

